# Standalone dev stack for nuna-content-service.
#
# The service holds no database of its own: all persistence goes through kaga,
# which is backed by PostgreSQL. This stack therefore brings up postgres + kaga
# + redis + the content-service so `docker compose up` works end-to-end.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kaga
      POSTGRES_USER: kaga
      POSTGRES_PASSWORD: kaga
    ports:
      - "5432:5432"
    volumes:
      - kaga-pgdata:/var/lib/postgresql/data

  kaga:
    build: ../../kaga
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/kaga
      SPRING_DATASOURCE_USERNAME: kaga
      SPRING_DATASOURCE_PASSWORD: kaga
      KAGA_API_KEY_KOSMOS: ${KAGA_API_KEY_KOSMOS:-dev-kosmos-key}
    ports:
      - "8090:8090"
    depends_on:
      - db

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  content-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      - kaga
      - redis
    environment:
      PORT: 4000
      NODE_ENV: production
      KAGA_URL: http://kaga:8090
      KAGA_API_KEY: ${KAGA_API_KEY_KOSMOS:-dev-kosmos-key}
      REDIS_URL: redis://redis:6379
    ports:
      - "4000:4000"

volumes:
  kaga-pgdata:
